  <textarea id="code-t1" class="code-store">import React, { useState } from 'react';
import { View, Text, TextInput, Button, StyleSheet } from 'react-native';

const BMI = () => {
  const [height, setHeight] = useState('');
  const [weight, setWeight] = useState('');
  const [bmi, setBMI] = useState(null);

  const calculateBMI = () => {
    const heightMeters = height / 100;
    const bmiValue = weight / (heightMeters * heightMeters);
    setBMI(bmiValue.toFixed(2));
  };

  return (
    <View style={styles.container}>
      <Text style={styles.title}>BMI Calculator</Text>

      <TextInput
        style={styles.input}
        placeholder="Enter your height (cm)"
        onChangeText={text => setHeight(text)}
        keyboardType="numeric"
      />

      <TextInput
        style={styles.input}
        placeholder="Enter your weight (kg)"
        onChangeText={text => setWeight(text)}
        keyboardType="numeric"
      />

      <Button title="Calculate" onPress={calculateBMI} />

      {bmi && <Text style={styles.result}>Your BMI: {bmi}</Text>}
    </View>
  );
};

const styles = StyleSheet.create({
  container: { flex: 1, justifyContent: 'center', alignItems: 'center', backgroundColor: '#fff' },
  title: { fontSize: 24, fontWeight: 'bold', marginBottom: 20 },
  input: { height: 40, width: '80%', borderColor: 'gray', borderWidth: 1, marginBottom: 20, paddingLeft: 10 },
  result: { marginTop: 20, fontSize: 20, fontWeight: 'bold' },
});

export default BMI;</textarea>

  <textarea id="code-t3" class="code-store">import React, { useState } from 'react';
import { View, Text, TextInput, Button, StyleSheet } from 'react-native';
import AsyncStorage from '@react-native-async-storage/async-storage';

const AddExpenseScreen = ({ navigation, route }) => {
  const [amount, setAmount] = useState('');
  const [category, setCategory] = useState('');
  const [date, setDate] = useState(new Date().toISOString());
  const { type } = route.params;

  const handleSave = async () => {
    try {
      const existingData = await AsyncStorage.getItem(type);
      let newData = [];
      if (existingData) newData = JSON.parse(existingData);
      
      newData.push({ amount: parseFloat(amount), category, date });
      await AsyncStorage.setItem(type, JSON.stringify(newData));
      navigation.navigate('Home');
    } catch (error) {
      console.error('Error saving data:', error);
    }
  };

  return (
    <View style={styles.container}>
      <Text style={styles.title}>Add {type === 'income' ? 'Income' : 'Expense'}</Text>
      <TextInput style={styles.input} placeholder="Amount" keyboardType="numeric" value={amount} onChangeText={setAmount} />
      <TextInput style={styles.input} placeholder="Category" value={category} onChangeText={setCategory} />
      <TextInput style={styles.input} placeholder="Date" value={date} onChangeText={setDate} />
      <Button title="Save" onPress={handleSave} />
    </View>
  );
};

const styles = StyleSheet.create({
  container: { flex: 1, alignItems: 'center', justifyContent: 'center' },
  title: { fontSize: 24, fontWeight: 'bold', marginBottom: 20 },
  input: { width: '80%', height: 40, borderWidth: 1, borderColor: '#ccc', borderRadius: 5, marginBottom: 10, paddingHorizontal: 10 },
});

export default AddExpenseScreen;</textarea>

  <textarea id="code-t5" class="code-store">import React, { useState, useEffect } from 'react';
import { View, Text, StyleSheet } from 'react-native';
import AsyncStorage from '@react-native-async-storage/async-storage';

const WeeklySummaryScreen = () => {
  const [weeklySummary, setWeeklySummary] = useState({});

  useEffect(() => { loadWeeklySummary(); }, []);

  const loadWeeklySummary = async () => {
    try {
      const incomeData = await AsyncStorage.getItem('income');
      const expenseData = await AsyncStorage.getItem('expense');
      const incomeArray = incomeData ? JSON.parse(incomeData) : [];
      const expenseArray = expenseData ? JSON.parse(expenseData) : [];

      const startDate = new Date();
      startDate.setDate(startDate.getDate() - startDate.getDay());
      const endDate = new Date();
      endDate.setDate(startDate.getDate() + 6);

      const summary = {};

      incomeArray.concat(expenseArray).forEach((item) => {
        const itemDate = new Date(item.date);
        if (itemDate >= startDate && itemDate <= endDate) {
          const category = item.category;
          const amount = item.amount;
          if (!summary[category]) summary[category] = { income: 0, expense: 0 };
          if (item.amount > 0) summary[category].income += amount;
          else summary[category].expense -= amount;
        }
      });
      setWeeklySummary(summary);
    } catch (error) {
      console.error('Error loading weekly summary:', error);
    }
  };

  return (
    <View style={styles.container}>
      <Text style={styles.title}>Weekly Summary</Text>
      {Object.keys(weeklySummary).map((category) => (
        <View key={category} style={styles.categoryContainer}>
          <Text style={styles.category}>{category}</Text>
          <Text style={styles.amount}>Income: ${weeklySummary[category].income.toFixed(2)}</Text>
          <Text style={styles.amount}>Expense: ${weeklySummary[category].expense.toFixed(2)}</Text>
        </View>
      ))}
    </View>
  );
};

const styles = StyleSheet.create({
  container: { flex: 1, alignItems: 'center', justifyContent: 'center' },
  title: { fontSize: 24, fontWeight: 'bold', marginBottom: 20 },
  categoryContainer: { marginBottom: 10 },
  category: { fontSize: 20, fontWeight: 'bold', marginBottom: 5 },
  amount: { fontSize: 16 },
});

export default WeeklySummaryScreen;</textarea>

  <textarea id="code-t7" class="code-store">import React, { useState } from 'react';
import { View, TextInput, Button, FlatList, Text, StyleSheet } from 'react-native';

const ToDoApp = () => {
  const [task, setTask] = useState('');
  const [tasks, setTasks] = useState([]);

  const addTask = () => {
    if (task.trim() !== '') {
      setTasks([...tasks, { id: Date.now(), task: task, completed: false }]);
      setTask('');
    }
  };

  const toggleTaskCompletion = id => {
    setTasks(tasks.map(task => {
      if (task.id === id) return { ...task, completed: !task.completed };
      return task;
    }));
  };

  const removeTask = id => {
    setTasks(tasks.filter(task => task.id !== id));
  };

  return (
    <View style={styles.container}>
      <TextInput style={styles.input} placeholder="Enter task" onChangeText={setTask} value={task} />
      <Button title="Add Task" onPress={addTask} />
      <FlatList
        data={tasks}
        keyExtractor={item => item.id.toString()}
        renderItem={({ item }) => (
          <View style={styles.task}>
            <Text style={{ textDecorationLine: item.completed ? 'line-through' : 'none' }}>{item.task}</Text>
            <View style={styles.buttonsContainer}>
              <Button title={item.completed ? "Undo" : "Done"} onPress={() => toggleTaskCompletion(item.id)} />
              <Button title="Remove" onPress={() => removeTask(item.id)} />
            </View>
          </View>
        )}
      />
    </View>
  );
};

const styles = StyleSheet.create({
  container: { flex: 1, justifyContent: 'center', padding: 20 },
  input: { height: 40, borderColor: 'gray', borderWidth: 1, marginBottom: 10, paddingHorizontal: 10 },
  task: { flexDirection: 'row', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 },
  buttonsContainer: { flexDirection: 'row' },
});

export default ToDoApp;</textarea>

        userType.setOnItemSelectedListener(new AdapterView.OnItemSelectedListener() {
            @Override
            public void onItemSelected(AdapterView<?> parent, View view, int position, long id) {
                type = parent.getItemAtPosition(position).toString();
                boolean isUser = type.equals("User");
                boolean isAdmin = type.equals("Admin");
                
                editPass1.setEnabled(isUser || isAdmin);
                editPass.setEnabled(isUser || isAdmin);
                editName.setEnabled(isUser || isAdmin);
                editID.setEnabled(isUser || isAdmin);
                editEnrollNo.setEnabled(isUser);
                editCardNo.setEnabled(isUser);
            }
            @Override
            public void onNothingSelected(AdapterView<?> parent) {}
        });

        FirebaseApp.initializeApp(this);
        firebaseAuth=FirebaseAuth.getInstance();
        db=FirebaseFirestore.getInstance();
        buttonRegister.setOnClickListener(this);
        toSignIn.setOnClickListener(this);
        check1.setOnClickListener(this);
    }

    private boolean verifyField(TextInputLayout field, String errorMsg, boolean checkEmail) {
        String text = field.getEditText().getText().toString().trim();
        if(text.isEmpty()) { 
            field.setErrorEnabled(true);
            field.setError(errorMsg);
            return true;
        } else if(checkEmail && !text.endsWith("@iiitnr.edu.in")) {
            field.setErrorEnabled(true);
            field.setError("Enter Valid Email ID");
            return true;
        } else {
            field.setErrorEnabled(false);
            return false;
        }
    }

    private void registerUser() {
        if (type.equals("Select Account Type")) {
            Toast.makeText(this, "Please select account type !", Toast.LENGTH_SHORT).show();
            return;
        }

        String id=editID.getEditText().getText().toString().trim();
        String pass=editPass.getEditText().getText().toString().trim();
        type1 = type.equals("User") ? 0 : 1;

        progressDialog.setMessage("Registering User ... ");
        progressDialog.show();

        firebaseAuth.createUserWithEmailAndPassword(id,pass).addOnCompleteListener(this, new OnCompleteListener<AuthResult>() {
            @Override
            public void onComplete(@NonNull Task<AuthResult> task) {
                if(task.isSuccessful()) {
                    String name=editName.getEditText().getText().toString().trim();
                    if(type1 == 0) {
                        int enroll=Integer.parseInt(editEnrollNo.getEditText().getText().toString().trim());
                        int card=Integer.parseInt(editCardNo.getEditText().getText().toString().trim());
                        db.collection("User").document(id).set(new User(name, id, enroll, card, type1)).addOnSuccessListener(new OnSuccessListener<Void>() {
                            @Override
                            public void onSuccess(Void avoid) {
                                progressDialog.cancel();
                                Toast.makeText(SignUpActivity.this, "Registered Successfully!", Toast.LENGTH_SHORT).show();
                                firebaseAuth.signOut();
                                startActivity(new Intent(getApplicationContext(), SignInActivity.class));
                                finish();
                            }
                        });
                    } else {
                        db.collection("User").document(id).set(new Admin(type1,name,id)).addOnSuccessListener(new OnSuccessListener<Void>() {
                            @Override
                            public void onSuccess(Void avoid) {
                                progressDialog.cancel();
                                Toast.makeText(SignUpActivity.this, "Registered Successfully!", Toast.LENGTH_SHORT).show();
                                firebaseAuth.signOut();
                                startActivity(new Intent(getApplicationContext(), SignInActivity.class));
                                finish();
                            }
                        });
                    }
                } else { 
                    progressDialog.cancel();
                    Toast.makeText(SignUpActivity.this, "Registration Failed! Try Again", Toast.LENGTH_SHORT).show();
                }
            }
        });
    }

    @Override
    public void onClick(View v) {
        if(v==check1) {
            buttonRegister.setEnabled(check1.isChecked());
        } else if(v==buttonRegister) {
            registerUser();
        } else if(v==toSignIn) {
            startActivity(new Intent(getApplicationContext(), SignInActivity.class));
            finish();
        }
    }
}</textarea>

  <textarea id="code-t17" class="code-store">package com.iiitnr.libraryapp;

import android.app.ProgressDialog;
import android.content.Intent;
import android.support.v7.app.AppCompatActivity;
import android.os.Bundle;
import android.support.v7.widget.LinearLayoutManager;
import android.support.v7.widget.RecyclerView;
import android.widget.TextView;
import com.firebase.ui.firestore.FirestoreRecyclerAdapter;
import com.firebase.ui.firestore.FirestoreRecyclerOptions;
import com.google.firebase.FirebaseApp;
import com.google.firebase.firestore.FirebaseFirestore;
import com.google.firebase.firestore.Query;

public class SearchBook extends AppCompatActivity {

    private FirebaseFirestore db;
    private FirestoreRecyclerAdapter adapter;
    private int mode = 0;
    private String key = "";
    ProgressDialog progressDialog;
    private TextView ifNoBook;
    Query query;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_search_book);
        ifNoBook=(TextView) findViewById(R.id.ifNoBook);
        progressDialog=new ProgressDialog(this);
        progressDialog.setMessage("Please Wait!");
        FirebaseApp.initializeApp(this);
        db=FirebaseFirestore.getInstance();
        progressDialog.show();
        Intent intent=getIntent();

        switch(intent.getIntExtra("id",0)) {
            case 1: mode=0; query=db.collection("Book").whereEqualTo("id", intent.getIntExtra("bid",0)).whereGreaterThan("available",0); break;
            case 2: mode=0; query=db.collection("Book").whereEqualTo("id", intent.getIntExtra("bid",0)); break;
            case 3: mode=1; key=intent.getStringExtra("btitle"); query=db.collection("Book").whereEqualTo("type", intent.getStringExtra("btype")).whereGreaterThan("available",0); break;
            case 4: mode=1; key=intent.getStringExtra("btitle"); query=db.collection("Book").whereEqualTo("type", intent.getStringExtra("btype")); break;
            case 5: mode=1; key=intent.getStringExtra("btitle"); query=db.collection("Book").whereGreaterThan("available",0); break;
            case 6: mode=1; key=intent.getStringExtra("btitle"); query=db.collection("Book"); break;
            case 7: mode=0; query=db.collection("Book").whereEqualTo("type", intent.getStringExtra("btype")).whereGreaterThan("available",0); break;
            case 8: mode=0; query=db.collection("Book").whereEqualTo("type", intent.getStringExtra("btype")); break;
        }

        FirestoreRecyclerOptions options = new FirestoreRecyclerOptions.Builder<Book>().setQuery(query, Book.class).build();
        adapter = new BookAdapter(options, key.toUpperCase(), mode);
        RecyclerView recyclerView = (RecyclerView) findViewById(R.id.recycle);
        recyclerView.setLayoutManager(new LinearLayoutManager(this));
        recyclerView.setAdapter(adapter);
        adapter.startListening();
        progressDialog.cancel();
    }

    @Override
    protected void onStart() { super.onStart(); adapter.startListening(); }
    @Override
    protected void onStop() { super.onStop(); adapter.stopListening(); }
}</textarea>
