<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Android Studio Installer</title>
</head>
<body>

  <button onclick="copyText(t1)">Copy Text1</button>
  <button onclick="copyText(t2)">Copy Text2</button>
  <button onclick="copyText(t3)">Copy Text3</button>
  <button onclick="copyText(t4)">Copy Text4</button>
  <button onclick="copyText(t5)">Copy Text5</button>

  <script>
    const t1 = `Hello! This text will be copied to clipboard1.`;
    const t2 = `Hello! This text will be copied to clipboard2.`;
    const t3 = `Hello! This text will be copied to clipboard3.`;
    const t4 = `Hello! This text will be copied to clipboard4.`;
    const t5 = `Hello! This text will be copied to clipboard5.`;
    
    function copyText(text) {
      navigator.clipboard.writeText(text)
    }
  </script>

</body>
</html>
